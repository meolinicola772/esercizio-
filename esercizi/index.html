

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .form{
            display: flex;
            flex-direction: column;
            max-width: 300px;
            gap: 16px;
            margin-bottom: 16px
        }
    </style>
</head>
<body>
    <h1>Il form di <span class="title-name"></span></h1>
    <div class="form">
        <label for="email">Email</label>
        <input type="email" name="email" class="email" placeholder="email">
        <label for="firstname">Name</label>
        <input type="text" name="firstname" class="firstname" placeholder="firstname">
        <label for="lastname">Surname</label>
        <input type="text" name="lastname" class="lastname" placeholder="lastname">
    </div>
    <button class="btn">Salva</button>
    <p class="printedform"></p>
    <script>
      const titolo = document.querySelector('.title-name')
      const nome = document.querySelector('.firstname')
    const button = document.querySelector('.btn');

button.addEventListener('click', () => {
   
  const value = nome.value
 
  titolo.textContent = value
  
sessionStorage.setItem('firstname', nome.value)
  })


   const nomeSalvato = sessionStorage.getItem('firstname')
    if (nomeSalvato) {
      nome.value = nomeSalvato
      titolo.textContent = nomeSalvato
    }
    </script>
</body>

</html>
