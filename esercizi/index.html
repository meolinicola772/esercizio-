<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOTR Cards</title>
  </head>
  <body>
    <h1>Lord of the Rings Cards</h1>

    <button id="btn">Carica carta</button>

    <div class="card">
      <h2 id="name">Nome personaggio</h2>
      <img id="image" alt="Immagine carta" width="250" />
    </div>

    <script>
      const button = document.getElementById("btn");
      button.addEventListener("click", fetchCard);

      async function fetchCard() {
        button.disabled = true;
        button.textContent = "Caricamento...";
        try {
          const response = await fetch(
            "https://corsproxy.io/?url=https://ringsdb.com/api/public/card/01001.json"
          );
          const data = await response.json();

          document.getElementById("name").textContent = data.name;
          document.getElementById("image").src = `https://ringsdb.com${data.imagesrc}`;
        } catch (error) {
          console.error("Errore:", error);
        } finally {
          button.disabled = false;
          button.textContent = "Carica carta";
        }
      }
    </script>
  </body>
</html>
