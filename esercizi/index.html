<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="container">
      <form>
        <div>
          <label>First Name:</label>
          <input type="text" class="form-input" id="firstName" value="Mario" />
        </div>
        <div>
          <label>Last Name:</label>
          <input type="text" class="form-input" id="lastName" value="Rossi" />
        </div>
        <div>
          <label>Age:</label>
          <input type="number" class="form-input" id="age" value="25" />
        </div>
      </form>
    </div>

    <script>
    const inputNome = document.querySelector('#firstName')
 const inputCognome = document.querySelector('#lastName')
 const inputEta = document.querySelector('#age')
const valoreNome = inputNome.value;
  const valoreCognome = inputCognome.value;
  const valoreEta = inputEta.value
const person = {
  firstName: inputNome.value,
  lastName: inputCognome.value,
  age: inputEta.value,
};
const form = document.querySelector('.form')
form.setAttribute('data-person', JSON.stringify(person));

    </script>
  </body>
</html>

 proprietà: firstName, lastName e age.
